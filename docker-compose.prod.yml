services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
      - CADDY_TLS_EMAIL=${CADDY_TLS_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/srv/dist:ro
      - caddy_data:/data       # TLS certs — NEVER delete this volume
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env.prod
    environment:
      # Unconditional: production must never start on unenforced/missing
      # secrets, regardless of what .env.prod does or doesn't set (15-…, P1.2).
      - APP_REQUIRE_SECRETS=1
      # Built here (not left as a literal ${POSTGRES_PASSWORD} inside
      # .env.prod) because env_file: values are passed through verbatim —
      # docker compose only expands ${...} in the compose file itself.
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - DATABASE_URL_SYNC=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # SEO launch pages + sitemap (23-…md B2) — reads index.html/missions
      # from the same shared read-only volume Caddy serves static assets
      # from (mounted below).
      - FRONTEND_DIST_PATH=/srv/dist
    volumes:
      - ./frontend/dist:/srv/dist:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # No ports: — only Caddy is internet-facing; backend is internal only.
    command: sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${WEB_CONCURRENCY:-4}"
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env.prod
    environment:
      # Same fail-closed/DB-wiring rules as `backend` — the worker is the
      # only process that ever runs scheduled jobs in prod (17-…md P3.1).
      - APP_REQUIRE_SECRETS=1
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - DATABASE_URL_SYNC=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    command: python -m app.worker
    restart: unless-stopped
    # No ports: — internal only, no HTTP server at all.

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No ports: — only reachable from other containers on the compose network

volumes:
  caddy_data:
  caddy_config:
  pg_data:
