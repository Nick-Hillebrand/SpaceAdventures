  - { t: "1969-07-18T04:52:01.500000Z", x: -321311.8, y: 70942.7, z: 0 }
  - { t: "1969-07-18T13:59:28.625000Z", x: -352599.8, y: 65449.2, z: 0 }
  - { t: "1969-07-18T23:06:55.750000Z", x: -374321.0, y: 58169.1, z: 0 }
  - { t: "1969-07-19T08:14:22.875000Z", x: -387442.8, y: 49547.5, z: 0 }
