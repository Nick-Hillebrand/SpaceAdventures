[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
markers =
    postgres_only: only meaningful under Postgres row locking (16-postgres-migration.md P2.4, 17-worker-and-scheduling.md P3.3) — skipped on SQLite, where it would only prove single-writer serialization.
addopts =
    --cov=app
    --cov-branch
    --cov-report=term-missing
    --cov-report=json
    --cov-fail-under=80
